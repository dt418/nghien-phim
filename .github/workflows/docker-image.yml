name: Docker Image CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING_SECRETS=()
          
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            MISSING_SECRETS+=("DOCKERHUB_USERNAME")
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            MISSING_SECRETS+=("DOCKERHUB_TOKEN")
          fi
          if [ -z "${{ secrets.CLOUDINARY_CLOUD_NAME }}" ]; then
            MISSING_SECRETS+=("CLOUDINARY_CLOUD_NAME")
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_BASE_URL }}" ]; then
            MISSING_SECRETS+=("NEXT_PUBLIC_BASE_URL")
          fi
          if [ -z "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" ]; then
            MISSING_SECRETS+=("UPSTASH_REDIS_REST_TOKEN")
          fi
          if [ -z "${{ secrets.UPSTASH_REDIS_REST_URL }}" ]; then
            MISSING_SECRETS+=("UPSTASH_REDIS_REST_URL")
          fi
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "Error: The following secrets are not set:"
            printf '%s\n' "${MISSING_SECRETS[@]}"
            exit 1
          fi
          
          echo "✓ All required secrets are configured"

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV

      - name: Build the Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/nghien-phim:$IMAGE_TAG \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/nghien-phim:latest \
            --build-arg CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
            --build-arg NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }} \
            --build-arg UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }} \
            --build-arg UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nghien-phim:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nghien-phim:latest
          echo "✓ Image pushed successfully"
